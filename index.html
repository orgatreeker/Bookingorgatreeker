<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyOS — Budgeting Complete Bundle by Orgatreeker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #00033D;
      --blue:   #0033FF;
      --purple: #977DFF;
      --white:  #F0EEFF;
      --muted:  #4A4888;
      --border: #0A0E55;
    }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.15;
      pointer-events: none;
    }
    .b1 { width: 520px; height: 520px; background: var(--blue);   top: -180px; left: -140px; }
    .b2 { width: 420px; height: 420px; background: var(--purple); bottom: -120px; right: -120px; }

    /* page */
    .page {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(151,125,255,0.1);
      border: 1px solid rgba(151,125,255,0.25);
      border-radius: 30px;
      padding: 5px 15px;
      font-size: 10px;
      color: var(--purple);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 26px;
      opacity: 0;
      animation: up 0.7s 0.1s ease forwards;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--purple);
      animation: blink 2s infinite;
    }

    /* headline */
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(30px, 6.5vw, 48px);
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 14px;
      opacity: 0;
      animation: up 0.7s 0.2s ease forwards;
    }
    h1 em {
      font-style: normal;
      background: linear-gradient(120deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* sub */
    .sub {
      font-size: 15px;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      line-height: 1.75;
      max-width: 440px;
      margin-bottom: 40px;
      opacity: 0;
      animation: up 0.7s 0.3s ease forwards;
    }

    /* video */
    .video-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #020520;
      box-shadow:
        0 0 0 1px rgba(0,51,255,0.08),
        0 0 60px rgba(0,51,255,0.1),
        0 32px 64px rgba(0,0,0,0.6);
      margin-bottom: 44px;
      opacity: 0;
      animation: up 0.7s 0.4s ease forwards;
      position: relative;
    }
    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* cta */
    .cta-wrap {
      width: 100%;
      max-width: 400px;
      opacity: 0;
      animation: up 0.7s 0.5s ease forwards;
    }

    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      padding: 18px 28px;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow:
        0 0 0 0 rgba(0,51,255,0),
        0 8px 28px rgba(0,0,0,0.5);
      animation: glow-pulse 2.8s 1.5s ease-in-out infinite;
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 55%);
    }
    /* shimmer sweep */
    .cta::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      animation: shimmer 3s 2s ease-in-out infinite;
    }
    .cta:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow:
        0 0 40px rgba(0,51,255,0.55),
        0 16px 40px rgba(0,0,0,0.55);
      animation: none;
    }
    .cta:active { transform: scale(0.98); }

    .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .cta:hover .arrow { transform: translateX(4px); }

    .cta-hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 11px;
      letter-spacing: 0.4px;
      font-style: italic;
    }

    /* animations */
    @keyframes up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.2; }
    }
    @keyframes shimmer {
      0%   { left: -100%; }
      100% { left: 160%;  }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 18px rgba(0,51,255,0.3), 0 8px 28px rgba(0,0,0,0.5); }
      50%       { box-shadow: 0 0 44px rgba(0,51,255,0.65), 0 8px 28px rgba(0,0,0,0.5); }
    }

    @media (max-width: 480px) {
      body { padding: 32px 16px; }
    }
  </style>
</head>
<body>

  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="page">

    <div class="badge"><span class="dot"></span> Orgatreeker</div>

    <h1>MoneyOS.<br /><em>Budgeting Complete Bundle.</em></h1>

    <p class="sub">
      Because your financial life deserves clarity — not chaos.
      Join 123,539+ users who transformed their financial lives.
    </p>

    <div class="video-wrap">
      <iframe 
        src="https://www.youtube.com/embed/aGtFJtfBGP0?si=dCPfxSqHAf40WkdZ" 
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen
      ></iframe>
    </div>

    <div class="cta-wrap">
      <a class="cta" href="https://topmate.io/orgatreeker/2020619" target="_blank" rel="noopener">
        Download MoneyOS <span class="arrow">→</span>
      </a>
      <p class="cta-hint">Instant Download. Works on Google Sheets.</p>
    </div>

  </div>

</body>
</html>
