<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orgatreeker</title>
<meta name="description" content="Watch our product video">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === RESET === */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;background:#fafafa;}
body{font-family:'Inter',sans-serif;background:#fafafa;color:#1a1a1a;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
img{max-width:100%;height:auto;display:block;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
:root{
  --bg:#fafafa;
  --text:#1a1a1a;
  --accent:#000;
  --border:#e5e5e5;
  --sans:'Inter',sans-serif;
}

/* === MINIMAL LAYOUT === */
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;}

/* === VIDEO CONTAINER === */
.video-section{width:100%;max-width:900px;margin-bottom:40px;}

.video-wrapper{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--border);
  background:#fff;
  box-shadow:0 12px 48px rgba(0,0,0,0.08);
}

.video-wrapper iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
}

/* === BUTTON === */
.cta-button{
  display:inline-block;
  padding:16px 48px;
  background:var(--accent);
  color:#fff;
  font-size:14px;
  font-weight:600;
  border-radius:8px;
  cursor:pointer;
  border:none;
  transition:all 0.3s ease;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
  text-decoration:none;
}

.cta-button:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.16);
  background:#222;
}

/* === RESPONSIVE === */
@media(max-width:768px){
  body{padding:32px 16px;}
  .video-section{margin-bottom:32px;}
  .cta-button{padding:14px 36px;font-size:13px;}
}

@media(max-width:480px){
  body{padding:24px 16px;}
  .video-section{margin-bottom:24px;}
  .cta-button{padding:12px 28px;font-size:13px;}
}
</style>
</head>
<body>

<div class="video-section">
  <div class="video-wrapper">
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/1186519212?h=237a8200c1" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" allowfullscreen></iframe>
  </div>
</div>

<button class="cta-button" onclick="window.open('https://superprofile.bio/vp/orgatreeker', '_blank')">Visit Product</button>

</body>
</html>
